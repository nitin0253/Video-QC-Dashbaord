<!DOCTYPE html>
<html>
<head>
  <title>QC Login</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #222;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: 320px;
    }

    h2 {
      margin-bottom: 20px;
    }

    /* ✅ Uniform styling */
    select, input, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    select, input {
      background: #e5e5e5;
    }

    button {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #error {
      color: red;
      font-size: 13px;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <select id="user">
    <option value="">Select User</option>
    <option>Nitin Kumar</option>
    <option>Ranbir Manoranjan</option>
    <option>Nand Kishor</option>
    <option>Rahul Raj</option>
  </select>

  <input type="password" id="password" placeholder="Enter password" />

  <button onclick="login()">Login</button>

  <p id="error"></p>
</div>

<script>

// 🔐 Password rule: FirstName@987
function getExpectedPassword(fullName) {
  const firstName = fullName.split(" ")[0];
  return firstName + "@987";
}

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("password").value;

  if (!user || !pass) {
    document.getElementById("error").innerText = "Please fill all fields";
    return;
  }

  const expectedPassword = getExpectedPassword(user);

  if (pass === expectedPassword) {
    localStorage.setItem("qc_reviewer", user);
    window.location.href = "index.html";
  } else {
    document.getElementById("error").innerText = "Invalid password";
  }
}

// ✅ Enter key support (password → login)
document.getElementById("password").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    login();
  }
});

// ✅ Enter key on dropdown → move to password
document.getElementById("user").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    document.getElementById("password").focus();
  }
});

</script>

</body>
</html>
