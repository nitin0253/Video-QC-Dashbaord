<!DOCTYPE html>
<html>
<head>
  <title>QC Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* 🌄 Background image */
      background: url('https://spyne-prod-tech.s3.amazonaws.com/api/upload/input_7c73faec-c023-4f50-a6e6-cda4312dd30f.jpg') no-repeat center center/cover;
    }

    /* 🌫 Glass container */
    .box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 30px;
      width: 320px;
      text-align: center;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 20px;
    }

    select, input, button {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    select, input {
      background: rgba(255,255,255,0.8);
    }

    button {
      background: #4CAF50;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #45a049;
    }

    #error {
      color: #ff6b6b;
      font-size: 13px;
    }

  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <select id="user">
    <option value="">Select User</option>
    <option>Nitin Kumar</option>
    <option>Ranbir Manoranjan</option>
    <option>Nand Kishor</option>
    <option>Rahul Raj</option>
  </select>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="login()">Login</button>

  <p id="error"></p>
</div>

<script>

function getExpectedPassword(fullName) {
  return fullName.split(" ")[0] + "@987";
}

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("password").value;

  if (!user || !pass) {
    document.getElementById("error").innerText = "Fill all fields";
    return;
  }

  if (pass === getExpectedPassword(user)) {
    localStorage.setItem("qc_reviewer", user);
    window.location.href = "index.html";
  } else {
    document.getElementById("error").innerText = "Invalid password";
  }
}

// Enter key login
document.getElementById("password").addEventListener("keypress", e => {
  if (e.key === "Enter") login();
});

</script>

</body>
</html>
