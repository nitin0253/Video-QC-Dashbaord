<!DOCTYPE html>
<html>
<head>
  <title>QA Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: #f4f6f8;
    }

    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 28%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    body.dark .sidebar {
      background: #1e293b;
    }

    .filter {
      padding: 10px;
    }

    .filter input, .filter select {
      width: 100%;
      margin: 5px 0;
      padding: 6px;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #222;
      color: white;
      padding: 8px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .main {
      width: 72%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    video {
      width: 75%;
      border-radius: 12px;
    }

    .meta {
      width: 75%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: white;
    }

    textarea {
      width: 75%;
      margin-top: 10px;
      padding: 10px;
    }

    .buttons button {
      margin: 5px;
      padding: 10px;
    }

    .side-panel {
      position: fixed;
      top: 80px;
      right: 0;
      width: 60px;
      background: #fff;
      transition: 0.3s;
    }

    .side-panel.expanded {
      width: 180px;
    }

    .menu-btn {
      padding: 15px;
      cursor: pointer;
    }

    .panel-content {
      display: none;
    }

    .side-panel.expanded .panel-content {
      display: block;
    }

  </style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href = "login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

  <!-- FILTERS -->
  <div class="sidebar">
    <div class="filter">

      <select id="enterpriseFilter" onchange="applyFilter()">
        <option value="all">All Enterprises</option>
      </select>

      <select id="qcUserFilter" onchange="applyFilter()">
        <option value="all">All QC Users</option>
      </select>

      <select id="statusFilter" onchange="applyFilter()">
        <option value="all">All Status</option>
        <option value="verified">Verified</option>
        <option value="rejected">Rejected</option>
      </select>

      <input id="videoSearch" placeholder="Video ID" oninput="applyFilter()">
      <input id="vinFilter" placeholder="VIN" oninput="applyFilter()">
      <input id="skuFilter" placeholder="SKU" oninput="applyFilter()">

      <label>Created Date</label>
      <input type="date" id="createdFrom" onchange="applyFilter()">
      <input type="date" id="createdTo" onchange="applyFilter()">

      <label>Updated Date</label>
      <input type="date" id="updatedFrom" onchange="applyFilter()">
      <input type="date" id="updatedTo" onchange="applyFilter()">

    </div>

    <table id="videoTable"></table>
  </div>

  <!-- PLAYER -->
  <div class="main">
    <video id="player" controls></video>
    <div id="meta" class="meta"></div>

    <div class="buttons">
      <button onclick="markQC('Approved')">Approve (A)</button>
      <button onclick="markQC('Rejected')">Reject (R)</button>
    </div>

    <textarea id="comment"></textarea>
  </div>

</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="side-panel">
  <div class="menu-btn" onclick="togglePanel()">☰</div>
  <div class="panel-content">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";
const API_URL = "PASTE_YOUR_SCRIPT_URL";

let videos = [];
let filteredVideos = [];
let currentIndex = 0;

document.getElementById("userName").innerText = reviewer;

fetch(SHEET_URL)
.then(res => res.text())
.then(csv => {
  const rows = csv.split("\n").map(r => r.split(","));
  const headers = rows[0];

  videos = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  });

  populateFilters();
  applyFilter();
});

function populateFilters() {
  const eSet = new Set();
  const uSet = new Set();

  videos.forEach(v => {
    eSet.add(v["v.enterprise_id"]);
    uSet.add(v.qc_user_email_id);
  });

  eSet.forEach(v => addOption("enterpriseFilter", v));
  uSet.forEach(v => addOption("qcUserFilter", v));
}

function addOption(id, val) {
  const opt = document.createElement("option");
  opt.value = val;
  opt.textContent = val;
  document.getElementById(id).appendChild(opt);
}

function applyFilter() {
  const enterprise = document.getElementById("enterpriseFilter").value;
  const qcUser = document.getElementById("qcUserFilter").value;
  const status = document.getElementById("statusFilter").value;

  const videoSearch = document.getElementById("videoSearch").value.toLowerCase();

  filteredVideos = videos.filter(v => {
    if (enterprise !== "all" && v["v.enterprise_id"] !== enterprise) return false;
    if (qcUser !== "all" && v.qc_user_email_id !== qcUser) return false;
    if (status !== "all" && v.verified_status !== status) return false;
    if (videoSearch && !v["v.video_id"].toLowerCase().includes(videoSearch)) return false;
    return true;
  });

  renderTable();
}

function renderTable() {
  let html = `<tr><th>Video</th></tr>`;
  filteredVideos.forEach((v,i) => {
    html += `<tr onclick="playVideo(${i})"><td>${v["v.video_id"]}</td></tr>`;
  });
  document.getElementById("videoTable").innerHTML = html;
}

function playVideo(i) {
  currentIndex = i;
  const v = filteredVideos[i];
  document.getElementById("player").src = v.video_url;
  document.getElementById("meta").innerHTML = v["v.video_id"];
}

function markQC(status) {
  console.log("QC:", status);
}

function togglePanel() {
  document.getElementById("sidePanel").classList.toggle("expanded");
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

function logout() {
  localStorage.removeItem("qc_reviewer");
  window.location.href = "login.html";
}

</script>

</body>
</html>
