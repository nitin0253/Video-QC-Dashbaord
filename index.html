<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Review Dashboard</title>
</head>

<body>

<div id="loginScreen">
  <input id="loginName" placeholder="Name">
  <input id="loginEmail" placeholder="Email">
  <button onclick="doLogin()">Login</button>
</div>

<h3 id="reviewerName"></h3>

<div>
  <button onclick="goPrev()">Prev</button>
  <span id="vidCounter"></span>
  <button onclick="goNext()">Next</button>
</div>

<div id="videoWrapper"></div>
<div id="metaPane"></div>

<textarea id="comment"></textarea>

<button onclick="selectAction('Approved')">Approve</button>
<button onclick="selectAction('Rejected')">Reject</button>
<button onclick="submitReview()">Submit</button>

<div id="statsRow"></div>

<div id="toast"></div>

<script>

// ───────────────── CONFIG ─────────────────
const API_URL = "https://script.google.com/macros/s/AKfycbw5n-1nQCHuW-HXFskmTRVXRw_0BZMx_W4s4rSk3Sx0RYF1FvRT4K45dKVOt-vRuMRe/exec";

// ───────────────── STATE ─────────────────
let reviewer = {};
let videos = [], filtered = [];
let currentIdx = -1;
let currentAction = null;
let localReviews = {};

// ───────────────── INIT ─────────────────
function init() {
  const saved = localStorage.getItem('qa_reviewer');
  if (saved) {
    reviewer = JSON.parse(saved);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('reviewerName').textContent = reviewer.name;
    loadData();
  }
  localReviews = JSON.parse(localStorage.getItem('qa_local_reviews') || '{}');
}

// ───────────────── LOGIN ─────────────────
function doLogin() {
  const name = loginName.value.trim();
  const email = loginEmail.value.trim();

  if (!name || !email) {
    showToast("Enter details", "error");
    return;
  }

  reviewer = { name, email };
  localStorage.setItem('qa_reviewer', JSON.stringify(reviewer));

  loginScreen.style.display = "none";
  reviewerName.textContent = name;

  loadData();
}

// ───────────────── LOAD DATA ─────────────────
async function loadData() {
  showToast("Loading...", "info");

  try {
    const res = await fetch(API_URL);
    const rows = await res.json();

    videos = rows.map(r => ({
      video_id: r['v.video_id'] || r['video_id'],
      status: (r['qa_status'] || r['verified_status'] || '').toLowerCase(),
      reason: r['qa_reason'],
      url: r['video_url']
    })).filter(v => v.video_id && v.url);

    filtered = videos;

    loadVideoAt(0);
    updateStats();

    showToast("Loaded " + videos.length, "success");

  } catch (e) {
    console.error(e);
    showToast("Failed to load data", "error");
  }
}

// ───────────────── VIDEO ─────────────────
function loadVideoAt(i) {
  if (!filtered[i]) return;

  currentIdx = i;

  const v = filtered[i];

  videoWrapper.innerHTML = `
    <video controls width="500">
      <source src="${v.url}">
    </video>
  `;

  vidCounter.textContent = `${i+1} / ${filtered.length}`;
}

// ───────────────── NAV ─────────────────
function goNext() {
  if (currentIdx < filtered.length - 1) loadVideoAt(currentIdx + 1);
}

function goPrev() {
  if (currentIdx > 0) loadVideoAt(currentIdx - 1);
}

// ───────────────── ACTION ─────────────────
function selectAction(a) {
  currentAction = a;
}

// ───────────────── SUBMIT ─────────────────
async function submitReview() {
  if (!currentAction) return;

  const v = filtered[currentIdx];
  const comment = document.getElementById("comment").value;

  if (currentAction === "Rejected" && !comment) {
    showToast("Add reason", "error");
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        video_id: v.video_id,
        action: currentAction,
        comment,
        reviewer: reviewer.email
      })
    });

    const text = await res.text();
    console.log(text);

    const result = JSON.parse(text);

    if (!result.success) throw new Error();

    localReviews[v.video_id] = { action: currentAction, comment };
    localStorage.setItem("qa_local_reviews", JSON.stringify(localReviews));

    showToast("Saved", "success");
    goNext();

  } catch (e) {
    showToast("Save failed", "error");
  }
}

// ───────────────── STATS ─────────────────
function updateStats() {
  statsRow.innerText = `Total: ${videos.length}`;
}

// ───────────────── TOAST ─────────────────
function showToast(msg, type) {
  toast.innerText = msg;
  setTimeout(() => toast.innerText = "", 2000);
}

// ───────────────── START ─────────────────
init();

</script>

</body>
</html>
