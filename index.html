<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Review Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --surface3: #1f2d45;
  --border: rgba(99,139,255,0.12);
  --border2: rgba(99,139,255,0.22);
  --accent: #4f7cff;
  --accent2: #7b9fff;
  --text: #e8edf5;
  --text2: #8b9ab5;
  --text3: #4d5c75;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
body.light {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --surface2: #f5f7ff;
  --surface3: #ebeffe;
  --border: rgba(79,124,255,0.15);
  --border2: rgba(79,124,255,0.3);
  --text: #0f172a;
  --text2: #4b5563;
  --text3: #9ca3af;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── LOGIN ── */
#loginScreen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  flex-direction: column;
  gap: 8px;
}
.login-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 40px 48px;
  width: 380px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
}
.login-box h2 { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.login-box p { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
.login-box input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-family: var(--sans);
  margin-bottom: 12px;
  outline: none;
  transition: border 0.2s;
}
.login-box input:focus { border-color: var(--accent); }
.login-box button {
  width: 100%;
  padding: 13px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.85; }
.login-logo { font-family: var(--mono); font-size: 13px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 32px; }

/* ── HEADER ── */
.header {
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.brand { font-family: var(--mono); font-size: 13px; color: var(--accent2); letter-spacing: 2px; font-weight: 600; }
.stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-pill {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--mono);
}
.stat-total   { background: rgba(79,124,255,0.12); color: var(--accent2); }
.stat-ok      { background: rgba(34,197,94,0.12);  color: var(--green); }
.stat-reject  { background: rgba(239,68,68,0.12);  color: var(--red); }
.stat-pending { background: rgba(245,158,11,0.12); color: var(--yellow); }
.stat-qa      { background: rgba(168,85,247,0.12); color: #c084fc; }

.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.reviewer-badge {
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  white-space: nowrap;
}
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* sync button special state */
.icon-btn.syncing { animation: spin 1s linear infinite; border-color: var(--accent); color: var(--accent); }

/* ── LAYOUT ── */
.app { display: flex; height: calc(100vh - 52px); }

/* ── SIDEBAR ── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

/* ── FILTERS ── */
.filter-panel {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.filter-panel input,
.filter-panel select {
  width: 100%;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  font-family: var(--sans);
  outline: none;
  transition: border 0.2s;
}
.filter-panel input:focus,
.filter-panel select:focus { border-color: var(--accent); }
.filter-panel select option { background: var(--surface2); }
.filter-row { display: flex; gap: 8px; }
.filter-row input { flex: 1; }
.btn-apply {
  flex: 1; padding: 8px;
  background: var(--accent);
  color: white;
  border: none; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
}
.btn-apply:hover { opacity: 0.85; }
.btn-clear {
  flex: 1; padding: 8px;
  background: var(--surface3);
  color: var(--text2);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 12px; font-weight: 500; cursor: pointer;
}

/* ── DATE TABS ── */
.date-tabs { display: flex; gap: 4px; }
.date-tab {
  flex: 1; padding: 6px 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.date-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

/* ── VIDEO LIST ── */
.video-list { flex: 1; overflow-y: auto; }
.video-list::-webkit-scrollbar { width: 4px; }
.video-list::-webkit-scrollbar-track { background: transparent; }
.video-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.list-empty { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }

.video-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 3px 8px;
  align-items: center;
}
.video-item:hover { background: var(--surface2); }
.video-item.active { background: var(--surface3); border-left: 2px solid var(--accent); }
.video-item.active .vid-id { color: var(--accent2); }

.vid-id { font-family: var(--mono); font-size: 11px; color: var(--text2); grid-column: 1; }
.vid-enterprise { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; grid-column: 1; }
.vid-date { font-size: 10px; color: var(--text3); grid-column: 1; }
.vid-badge {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  white-space: nowrap;
  grid-column: 2;
  grid-row: 1 / 3;
  align-self: center;
}
/* FIX: was badge-reject (missing 'ed') — unified both names */
.badge-verified  { background: rgba(34,197,94,0.12);   color: var(--green); }
.badge-rejected  { background: rgba(239,68,68,0.12);   color: var(--red); }
.badge-reject    { background: rgba(239,68,68,0.12);   color: var(--red); }   /* alias kept */
.badge-done      { background: rgba(245,158,11,0.12);  color: var(--yellow); }
.badge-pending   { background: rgba(79,124,255,0.1);   color: var(--accent2); }
.badge-qa-saved  { background: rgba(168,85,247,0.15);  color: #c084fc; }      /* locally reviewed */

/* ── MAIN ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* ── VIDEO + META ROW ── */
.content-row {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── VIDEO PANE ── */
.video-pane {
  flex: 1.4;
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 10px;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.video-wrapper {
  flex: 1;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  min-height: 0;
}
video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  border-radius: 12px;
  display: block;
}
.vid-nav { display: flex; align-items: center; justify-content: space-between; }
.nav-btn {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.vid-counter { font-family: var(--mono); font-size: 12px; color: var(--text3); }

/* ── META PANE ── */
.meta-pane {
  width: 300px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 16px;
  gap: 12px;
}
.meta-pane::-webkit-scrollbar { width: 4px; }
.meta-pane::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.meta-section { display: flex; flex-direction: column; gap: 8px; }
.meta-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 2px; }
.meta-row { display: flex; flex-direction: column; gap: 2px; }
.meta-key { font-size: 10px; color: var(--text3); }
.meta-val { font-size: 12px; color: var(--text); word-break: break-all; }
.meta-val.mono { font-family: var(--mono); font-size: 11px; }
.divider { height: 1px; background: var(--border); flex-shrink: 0; }

.current-status-box {
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.current-status-box .label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.status-display { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.status-text { font-size: 13px; font-weight: 600; }

/* ── ACTION BAR ── */
.action-bar {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.action-btns { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.btn-approve {
  padding: 10px 22px;
  background: rgba(34,197,94,0.12);
  color: var(--green);
  border: 1px solid rgba(34,197,94,0.3);
  border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.btn-approve:hover { background: rgba(34,197,94,0.2); }
.btn-approve.selected { background: var(--green); color: white; border-color: var(--green); }

.btn-reject {
  padding: 10px 22px;
  background: rgba(239,68,68,0.1);
  color: var(--red);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.btn-reject:hover { background: rgba(239,68,68,0.18); }
.btn-reject.selected { background: var(--red); color: white; border-color: var(--red); }

.btn-submit {
  padding: 10px 22px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  margin-left: auto;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
  position: relative;
  min-width: 140px;
  justify-content: center;
}
.btn-submit:hover:not(:disabled) { opacity: 0.85; }
.btn-submit:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-submit.submitting { opacity: 0.7; cursor: wait; }

.kbd {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 5px;
  border: 1px solid currentColor;
  border-radius: 4px;
  opacity: 0.6;
}

/* ── COMMENT + REASONS ── */
.comment-row { display: flex; gap: 10px; align-items: flex-start; }
.comment-area {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  font-family: var(--sans);
  resize: none;
  height: 70px;
  outline: none;
  transition: border 0.2s;
}
.comment-area:focus { border-color: var(--accent); }

.quick-reasons {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  max-width: 280px;
}
.reason-btn {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid rgba(239,68,68,0.2);
  background: rgba(239,68,68,0.06);
  color: #f87171;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.reason-btn:hover { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }
.reason-btn.active { background: var(--red); color: white; border-color: var(--red); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 11px 22px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(.34,1.4,.64,1);
  z-index: 9999;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: #15803d; color: white; }
.toast.error   { background: #b91c1c; color: white; }
.toast.info    { background: var(--accent); color: white; }
.toast.warn    { background: #b45309; color: white; }

/* ── LOADING OVERLAY ── */
.loading-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  border-radius: 12px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── EMPTY STATE ── */
.no-video { color: var(--text3); text-align: center; }
.no-video span { font-size: 32px; display: block; margin-bottom: 8px; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── SYNC QUEUE BADGE ── */
.queue-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--mono);
  background: rgba(245,158,11,0.12);
  color: var(--yellow);
  border: 1px solid rgba(245,158,11,0.2);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.queue-badge:hover { background: rgba(245,158,11,0.22); }
.queue-badge.all-synced { background: rgba(34,197,94,0.1); color: var(--green); border-color: rgba(34,197,94,0.2); cursor: default; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-logo">⬡ QA REVIEW SYSTEM</div>
  <div class="login-box">
    <h2>Welcome back</h2>
    <p>Sign in to access the QA review dashboard</p>
    <input id="loginName"  type="text"  placeholder="Your full name" autocomplete="off" />
    <input id="loginEmail" type="email" placeholder="Email address"  autocomplete="off" />
    <button onclick="doLogin()">Sign In →</button>
  </div>
</div>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-left">
    <div class="brand">⬡ QA DASHBOARD</div>
    <div class="stats-row" id="statsRow">
      <span class="stat-pill stat-total">— total</span>
    </div>
  </div>
  <div class="header-right">
    <div class="queue-badge all-synced" id="queueBadge" onclick="flushQueue()" title="Pending submissions to sync">✓ Synced</div>
    <button class="icon-btn" id="refreshBtn" onclick="reloadData()" title="Refresh data">↻</button>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">☀</button>
    <span class="reviewer-badge">👤 <span id="reviewerName">—</span></span>
    <button class="icon-btn" onclick="logout()" title="Logout">⏻</button>
  </div>
</div>

<!-- ── APP ── -->
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="filter-panel">

      <!-- Date tabs — FIX: now calls applyFilter() on click -->
      <div class="date-tabs" id="dateTabs">
        <div class="date-tab active" data-val="all"       onclick="setDateFilter(this,'all')">All</div>
        <div class="date-tab"        data-val="today"     onclick="setDateFilter(this,'today')">Today</div>
        <div class="date-tab"        data-val="yesterday" onclick="setDateFilter(this,'yesterday')">Yesterday</div>
        <div class="date-tab"        data-val="week"      onclick="setDateFilter(this,'week')">7 Days</div>
      </div>

      <select id="fEnterprise"><option value="">All Enterprises</option></select>
      <select id="fQCUser"><option value="">All QC Users</option></select>

      <select id="fStatus">
        <option value="">All Statuses</option>
        <option value="verified">✓ Verified</option>
        <option value="rejected">✗ Rejected</option>
        <option value="done">◉ Done</option>
      </select>

      <div class="filter-row">
        <input id="fVideoId" placeholder="Video ID…" />
        <input id="fVin"     placeholder="VIN…" />
      </div>
      <input id="fSku" placeholder="SKU…" />

      <div class="filter-row">
        <button class="btn-apply" onclick="applyFilter()">Apply</button>
        <button class="btn-clear" onclick="clearFilters()">Clear</button>
      </div>

    </div>

    <!-- Video list -->
    <div class="video-list" id="videoList">
      <div class="list-empty">Loading…</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="content-row">

      <!-- Video pane -->
      <div class="video-pane">
        <div class="vid-nav">
          <button class="nav-btn" onclick="goPrev()">← Prev <span class="kbd">←</span></button>
          <span class="vid-counter" id="vidCounter">— / —</span>
          <button class="nav-btn" onclick="goNext()">Next <span class="kbd">→</span></button>
        </div>
        <div class="video-wrapper" id="videoWrapper">
          <div class="no-video"><span>▶</span>Select a video to begin</div>
        </div>
      </div>

      <!-- Meta pane -->
      <div class="meta-pane" id="metaPane">
        <div class="meta-label">Video Details</div>
        <div style="color:var(--text3);font-size:13px;">Select a video from the list</div>
      </div>

    </div>

    <!-- Action bar -->
    <div class="action-bar">

      <div class="action-btns">
        <button class="btn-approve" id="btnApprove" onclick="selectAction('Approved')">
          ✓ Approve <span class="kbd">A</span>
        </button>
        <button class="btn-reject"  id="btnReject"  onclick="selectAction('Rejected')">
          ✗ Reject <span class="kbd">R</span>
        </button>
        <button class="btn-submit"  id="btnSubmit"  onclick="submitReview()" disabled>
          Submit <span class="kbd">↵</span>
        </button>
      </div>

      <div class="comment-row">
        <textarea class="comment-area" id="comment" placeholder="Add comment or rejection reason…"></textarea>
        <div class="quick-reasons" id="quickReasons" style="display:none">
          <div class="reason-btn" onclick="toggleReason(this,'Voiceover Issue')">Voiceover</div>
          <div class="reason-btn" onclick="toggleReason(this,'Background Music Issue')">Music</div>
          <div class="reason-btn" onclick="toggleReason(this,'Image removeBG Issue')">removeBG</div>
          <div class="reason-btn" onclick="toggleReason(this,'Transition Issue')">Transition</div>
          <div class="reason-btn" onclick="toggleReason(this,'Data Issue')">Data</div>
          <div class="reason-btn" onclick="toggleReason(this,'Image Selection Issue')">Selection</div>
          <div class="reason-btn" onclick="toggleReason(this,'Repeated Images')">Repeated</div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const SHEET_URL  = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";
const GAS_URL    = "https://script.google.com/macros/s/AKfycbzqgbmMLIuCz4j6HgFsVgEp4t2ykTsCpNCth2OlSIgIMbU6_SePL4fIHYEqogDGLxs/exec";

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let reviewer      = { name: '', email: '' };
let videos        = [];
let filtered      = [];
let currentIdx    = -1;
let currentAction = null;
let dateFilter    = 'all';

// localReviews  – keyed by video_id, stores action/comment/timestamp
// submitQueue   – array of items waiting to be POSTed to the sheet
let localReviews  = {};
let submitQueue   = [];

// ─────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('qa_reviewer');
  if (saved) {
    reviewer = JSON.parse(saved);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('reviewerName').textContent  = reviewer.name;
    loadData();
  }
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
  localReviews = JSON.parse(localStorage.getItem('qa_local_reviews') || '{}');
  submitQueue  = JSON.parse(localStorage.getItem('qa_submit_queue')  || '[]');
  updateQueueBadge();
}

// ─────────────────────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────────────────────
function doLogin() {
  const name  = document.getElementById('loginName').value.trim();
  const email = document.getElementById('loginEmail').value.trim();
  if (!name || !email) { showToast('Enter name and email', 'error'); return; }
  reviewer = { name, email };
  localStorage.setItem('qa_reviewer', JSON.stringify(reviewer));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('reviewerName').textContent  = name;
  loadData();
}
document.getElementById('loginName').addEventListener('keydown',  e => { if (e.key === 'Enter') document.getElementById('loginEmail').focus(); });
document.getElementById('loginEmail').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function logout() { localStorage.removeItem('qa_reviewer'); location.reload(); }

// ─────────────────────────────────────────────────────────────
//  CSV PARSER  (handles quoted commas)
// ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  const splitRow = row => {
    const cols = []; let cur = '', inQ = false;
    for (let i = 0; i < row.length; i++) {
      const c = row[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  };
  const headers = splitRow(lines[0]);
  return lines.slice(1).map(line => {
    const cols = splitRow(line);
    const obj  = {};
    headers.forEach((h, i) => { obj[h.trim()] = (cols[i] || '').replace(/^"|"$/g, '').trim(); });
    return obj;
  });
}

// ─────────────────────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────────────────────
async function loadData() {
  document.getElementById('refreshBtn').classList.add('syncing');
  showToast('Loading data…', 'info');
  try {
    // Cache-bust so we always get latest sheet data
    const res  = await fetch(SHEET_URL + '&_t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);

    videos = rows.map(r => ({
      video_id:      r['v.video_id']      || r['video_id']      || '',
      enterprise:    r['enterprise_name'] || '',
      enterprise_id: r['v.enterprise_id'] || r['enterprise_id'] || '',
      qc_user:       r['qc_user_email_id']|| '',
      qc_status:     r['qc_user']         || '',
      status:        (r['verified_status'] || '').toLowerCase(),
      reason:        r['rejected_reason'] || '',
      vin:           r['vin_name']        || '',
      sku:           r['sku_id']          || '',
      url:           r['video_url']       || '',
      created:       r['created_on']      || '',
      updated:       r['updated_on']      || '',
    })).filter(v => v.video_id && v.url && v.url.startsWith('http'));

    populateFilters();
    applyFilter();
    updateStats();
    showToast(`✓ ${videos.length} videos loaded`, 'success');
  } catch (e) {
    showToast('Failed to load sheet data', 'error');
    console.error(e);
  } finally {
    document.getElementById('refreshBtn').classList.remove('syncing');
  }
}

function reloadData() { loadData(); }

// ─────────────────────────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────────────────────────

// FIX: setDateFilter now calls applyFilter() so clicking a tab immediately filters
function setDateFilter(el, val) {
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  dateFilter = val;
  applyFilter();  // ← was missing
}

function getDateBound(daysAgo) {
  const d = new Date();
  d.setDate(d.getDate() - daysAgo);
  d.setHours(0, 0, 0, 0);
  return d;
}

function matchesDateFilter(v) {
  if (dateFilter === 'all') return true;
  // Try created first, fall back to updated
  const raw = v.created || v.updated;
  if (!raw) return true;
  const d = new Date(raw);
  if (isNaN(d)) return true;
  if (dateFilter === 'today')     return d >= getDateBound(0);
  if (dateFilter === 'yesterday') return d >= getDateBound(1) && d < getDateBound(0);
  if (dateFilter === 'week')      return d >= getDateBound(7);
  return true;
}

function populateFilters() {
  const ents  = [...new Set(videos.map(v => v.enterprise).filter(Boolean))].sort();
  const users = [...new Set(videos.map(v => v.qc_user).filter(u => u && u.includes('@')))].sort();

  document.getElementById('fEnterprise').innerHTML =
    '<option value="">All Enterprises</option>' + ents.map(e => `<option value="${e}">${e}</option>`).join('');
  document.getElementById('fQCUser').innerHTML =
    '<option value="">All QC Users</option>' + users.map(u => `<option value="${u}">${u}</option>`).join('');
}

function applyFilter() {
  const ent    = document.getElementById('fEnterprise').value;
  const user   = document.getElementById('fQCUser').value;
  const status = document.getElementById('fStatus').value;
  const vidId  = document.getElementById('fVideoId').value.trim().toLowerCase();
  const vin    = document.getElementById('fVin').value.trim().toLowerCase();
  const sku    = document.getElementById('fSku').value.trim().toLowerCase();

  filtered = videos.filter(v =>
    (!ent    || v.enterprise === ent)  &&
    (!user   || v.qc_user   === user)  &&
    (!status || v.status    === status) &&
    (!vidId  || v.video_id.toLowerCase().includes(vidId)) &&
    (!vin    || v.vin.toLowerCase().includes(vin)) &&
    (!sku    || v.sku.toLowerCase().includes(sku)) &&
    matchesDateFilter(v)
  );

  renderList();
  updateStats();

  if (filtered.length) {
    loadVideoAt(0);
  } else {
    currentIdx = -1;
    document.getElementById('videoWrapper').innerHTML = '<div class="no-video"><span>🔍</span>No videos match filters</div>';
    document.getElementById('metaPane').innerHTML     = '<div class="meta-label">Video Details</div><div style="color:var(--text3);font-size:13px;">No match</div>';
    document.getElementById('vidCounter').textContent = '0 / 0';
  }
}

function clearFilters() {
  document.getElementById('fEnterprise').value = '';
  document.getElementById('fQCUser').value     = '';
  document.getElementById('fStatus').value     = '';
  document.getElementById('fVideoId').value    = '';
  document.getElementById('fVin').value        = '';
  document.getElementById('fSku').value        = '';
  document.querySelectorAll('.date-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.date-tab[data-val="all"]').classList.add('active');
  dateFilter = 'all';
  applyFilter();
}

// ─────────────────────────────────────────────────────────────
//  RENDER LIST
// ─────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('videoList');
  if (!filtered.length) { list.innerHTML = '<div class="list-empty">No videos found</div>'; return; }

  list.innerHTML = filtered.map((v, i) => {
    const lr           = localReviews[v.video_id];
    const displayStatus = lr ? lr.action : v.status;
    const badge        = getBadge(displayStatus, !!lr);
    const dateStr      = (v.created || '').slice(0, 10);
    return `<div class="video-item${i === currentIdx ? ' active' : ''}" id="vi-${i}" onclick="loadVideoAt(${i})">
      <div class="vid-enterprise">${escHtml(v.enterprise || '—')}</div>
      <div class="vid-badge ${badge.cls}">${badge.label}</div>
      <div class="vid-id">${escHtml(v.video_id)}</div>
      <div class="vid-date">${dateStr}</div>
    </div>`;
  }).join('');
}

// FIX: consistent badge classes (badge-rejected used throughout, alias badge-reject also in CSS)
function getBadge(status, isLocalReview = false) {
  if (isLocalReview) {
    const s = (status || '').toLowerCase();
    if (s === 'approved') return { cls: 'badge-qa-saved', label: '★ QA Approved' };
    if (s === 'rejected') return { cls: 'badge-qa-saved', label: '★ QA Rejected' };
    return { cls: 'badge-qa-saved', label: '★ QA Saved' };
  }
  if (!status) return { cls: 'badge-pending', label: 'Pending' };
  const s = status.toLowerCase();
  if (s === 'verified' || s === 'approved') return { cls: 'badge-verified',  label: '✓ Verified' };
  if (s === 'rejected')                     return { cls: 'badge-rejected',  label: '✗ Rejected' };
  if (s === 'done')                         return { cls: 'badge-done',      label: '◉ Done' };
  return { cls: 'badge-pending', label: s };
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────────────
//  LOAD VIDEO
// ─────────────────────────────────────────────────────────────
function loadVideoAt(idx) {
  if (idx < 0 || idx >= filtered.length) return;
  currentIdx    = idx;
  currentAction = null;

  const btnApprove = document.getElementById('btnApprove');
  const btnReject  = document.getElementById('btnReject');
  const btnSubmit  = document.getElementById('btnSubmit');
  btnApprove.classList.remove('selected');
  btnReject.classList.remove('selected');
  btnSubmit.disabled = true;
  document.getElementById('quickReasons').style.display = 'none';
  document.getElementById('comment').value = '';
  document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('active'));

  const v  = filtered[idx];
  const lr = localReviews[v.video_id];

  // FIX: restore local review state AND enable submit so reviewer can re-submit
  if (lr) {
    document.getElementById('comment').value = lr.comment || '';
    currentAction = lr.action;
    btnApprove.classList.toggle('selected', lr.action === 'Approved');
    btnReject.classList.toggle('selected',  lr.action === 'Rejected');
    document.getElementById('quickReasons').style.display = lr.action === 'Rejected' ? 'flex' : 'none';
    btnSubmit.disabled = false;   // ← FIX: was left disabled, blocking re-submit
  }

  // Video element
  const wrapper = document.getElementById('videoWrapper');
  wrapper.innerHTML = `
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <video id="player" controls preload="metadata">
      <source src="${escHtml(v.url)}" type="video/mp4" />
    </video>`;
  const player = document.getElementById('player');
  player.oncanplay = () => { const ol = document.getElementById('loadingOverlay'); if(ol) ol.remove(); };
  player.onerror   = () => {
    const ol = document.getElementById('loadingOverlay'); if(ol) ol.remove();
    wrapper.innerHTML = `<div class="no-video"><span>⚠</span>Video unavailable</div>`;
  };

  document.getElementById('vidCounter').textContent = `${idx + 1} / ${filtered.length}`;
  renderMeta(v);

  // Highlight active item + scroll into view
  document.querySelectorAll('.video-item').forEach((el, i) => el.classList.toggle('active', i === idx));
  document.getElementById(`vi-${idx}`)?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────────
//  META PANEL
// ─────────────────────────────────────────────────────────────
function renderMeta(v) {
  const lr            = localReviews[v.video_id];
  const effectiveStatus = lr ? lr.action : v.status;
  const inQueue       = submitQueue.some(q => q.video_id === v.video_id);

  const dotColor =
    (effectiveStatus === 'Approved' || effectiveStatus === 'verified') ? 'var(--green)' :
    (effectiveStatus === 'Rejected' || effectiveStatus === 'rejected') ? 'var(--red)'   :
     effectiveStatus === 'done'                                        ? 'var(--yellow)' :
    'var(--text3)';

  const syncNote = inQueue
    ? `<div style="margin-top:6px;font-size:11px;color:var(--yellow)">⏳ Pending sync to sheet</div>`
    : lr
    ? `<div style="margin-top:6px;font-size:11px;color:var(--green)">✓ Synced to sheet</div>`
    : '';

  document.getElementById('metaPane').innerHTML = `
    <div class="meta-label">QC Status</div>
    <div class="current-status-box">
      <div class="label">Current Status</div>
      <div class="status-display">
        <div class="status-dot" style="background:${dotColor}"></div>
        <div class="status-text" style="color:${dotColor}">${escHtml(effectiveStatus || 'Pending Review')}</div>
      </div>
      ${v.reason ? `<div style="margin-top:6px;font-size:11px;color:var(--text3)">Reason: ${escHtml(v.reason)}</div>` : ''}
      ${syncNote}
    </div>
    <div class="divider"></div>
    <div class="meta-label">Video Info</div>
    <div class="meta-section">
      ${mRow('Video ID',   v.video_id,      true)}
      ${mRow('Enterprise', v.enterprise)}
      ${mRow('Ent. ID',    v.enterprise_id)}
    </div>
    <div class="divider"></div>
    <div class="meta-label">QC Info</div>
    <div class="meta-section">
      ${mRow('QC User',   v.qc_user)}
      ${mRow('QC Status', v.qc_status)}
    </div>
    <div class="divider"></div>
    <div class="meta-label">Asset Info</div>
    <div class="meta-section">
      ${mRow('VIN', v.vin || '—')}
      ${mRow('SKU', v.sku || '—', true)}
    </div>
    <div class="divider"></div>
    <div class="meta-label">Timestamps</div>
    <div class="meta-section">
      ${mRow('Created', v.created)}
      ${mRow('Updated', v.updated)}
    </div>`;
}

function mRow(key, val, mono = false) {
  return `<div class="meta-row">
    <div class="meta-key">${key}</div>
    <div class="meta-val${mono ? ' mono' : ''}">${escHtml(val || '—')}</div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
//  NAVIGATION
// ─────────────────────────────────────────────────────────────
function goPrev() { if (currentIdx > 0)                        loadVideoAt(currentIdx - 1); }
function goNext() { if (currentIdx < filtered.length - 1)     loadVideoAt(currentIdx + 1); }

// ─────────────────────────────────────────────────────────────
//  ACTION SELECTION
// ─────────────────────────────────────────────────────────────
function selectAction(type) {
  currentAction = type;
  document.getElementById('btnApprove').classList.toggle('selected', type === 'Approved');
  document.getElementById('btnReject').classList.toggle('selected',  type === 'Rejected');
  document.getElementById('quickReasons').style.display = type === 'Rejected' ? 'flex' : 'none';
  document.getElementById('btnSubmit').disabled = false;
}

function toggleReason(btn, reason) {
  const ta = document.getElementById('comment');
  if (btn.classList.contains('active')) {
    btn.classList.remove('active');
    ta.value = ta.value.split(',').map(s => s.trim()).filter(s => s !== reason).join(', ');
  } else {
    btn.classList.add('active');
    ta.value = ta.value ? ta.value.trim() + ', ' + reason : reason;
  }
}

// ─────────────────────────────────────────────────────────────
//  SUBMIT REVIEW  —  saves locally + POSTs to Apps Script
// ─────────────────────────────────────────────────────────────
async function submitReview() {
  if (currentIdx < 0 || !currentAction) return;

  const v       = filtered[currentIdx];
  const comment = document.getElementById('comment').value.trim();

  if (currentAction === 'Rejected' && !comment) {
    showToast('Add a rejection reason before submitting', 'error');
    document.getElementById('comment').focus();
    return;
  }

  const payload = {
    video_id:  v.video_id,
    action:    currentAction,
    comment:   comment,
    reviewer:  reviewer.email,
    timestamp: new Date().toISOString(),
  };

  // 1. Save locally immediately (offline-safe)
  localReviews[v.video_id] = payload;
  localStorage.setItem('qa_local_reviews', JSON.stringify(localReviews));

  // 2. Update UI optimistically
  const btnSubmit = document.getElementById('btnSubmit');
  btnSubmit.disabled = true;
  btnSubmit.classList.add('submitting');
  btnSubmit.textContent = 'Saving…';

  renderMeta(v);
  updateListItemBadge(currentIdx, currentAction, true);
  updateStats();

  // 3. POST to Apps Script
  const ok = await postToSheet(payload);

  btnSubmit.classList.remove('submitting');
  btnSubmit.textContent = 'Submit ↵';
  btnSubmit.disabled = false;

  if (ok) {
    showToast(`${currentAction} saved to sheet ✓`, 'success');
    // Remove from queue if it was queued
    submitQueue = submitQueue.filter(q => q.video_id !== v.video_id);
    localStorage.setItem('qa_submit_queue', JSON.stringify(submitQueue));
  } else {
    // Add to offline queue for retry
    if (!submitQueue.some(q => q.video_id === v.video_id)) {
      submitQueue.push(payload);
      localStorage.setItem('qa_submit_queue', JSON.stringify(submitQueue));
    }
    showToast('Saved locally — will sync when online', 'warn');
  }

  updateQueueBadge();
  renderMeta(v);

  // Auto-advance after short delay
  setTimeout(() => { if (currentIdx < filtered.length - 1) goNext(); }, 700);
}

// ─────────────────────────────────────────────────────────────
//  POST TO APPS SCRIPT (no-cors handles the opaque response)
// ─────────────────────────────────────────────────────────────
async function postToSheet(payload) {
  try {
    // Apps Script requires GET with query params for no-cors POST workaround,
    // OR a proper CORS-enabled doPost. We try doPost first (fetch with mode cors
    // won't work unless the Apps Script returns CORS headers).
    // The safest approach: use fetch with no-cors (fire-and-forget), then
    // verify by checking if video was actually updated in a follow-up read.
    // For simplicity we use no-cors and treat it as "sent".

    await fetch(GAS_URL, {
      method:  'POST',
      mode:    'no-cors',           // Apps Script doesn't send CORS headers by default
      headers: { 'Content-Type': 'text/plain' },  // text/plain avoids CORS preflight
      body:    JSON.stringify(payload),
    });
    // With no-cors we can't read the response — assume success if no network error
    return true;
  } catch (err) {
    console.warn('POST failed:', err);
    return false;
  }
}

// ─────────────────────────────────────────────────────────────
//  FLUSH OFFLINE QUEUE
// ─────────────────────────────────────────────────────────────
async function flushQueue() {
  if (!submitQueue.length) return;
  showToast(`Syncing ${submitQueue.length} queued items…`, 'info');
  const remaining = [];
  for (const item of submitQueue) {
    const ok = await postToSheet(item);
    if (!ok) remaining.push(item);
  }
  submitQueue = remaining;
  localStorage.setItem('qa_submit_queue', JSON.stringify(submitQueue));
  updateQueueBadge();
  if (!remaining.length) showToast('All items synced ✓', 'success');
  else showToast(`${remaining.length} items still pending`, 'warn');
}

function updateQueueBadge() {
  const badge = document.getElementById('queueBadge');
  const n     = submitQueue.length;
  if (n === 0) {
    badge.textContent = '✓ Synced';
    badge.className   = 'queue-badge all-synced';
  } else {
    badge.textContent = `⏳ ${n} pending`;
    badge.className   = 'queue-badge';
  }
}

function updateListItemBadge(idx, action, isLocal) {
  const el = document.getElementById(`vi-${idx}`);
  if (!el) return;
  const b = getBadge(action, isLocal);
  const badgeEl = el.querySelector('.vid-badge');
  if (badgeEl) { badgeEl.className = `vid-badge ${b.cls}`; badgeEl.textContent = b.label; }
}

// ─────────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────────
function updateStats() {
  const total    = videos.length;
  const verified = videos.filter(v => v.status === 'verified').length;
  const rejected = videos.filter(v => v.status === 'rejected').length;
  const filtCount= filtered.length;
  // Count local QA reviews done this session
  const qaCount  = Object.keys(localReviews).length;

  document.getElementById('statsRow').innerHTML = `
    <span class="stat-pill stat-total">${total} total</span>
    <span class="stat-pill stat-ok">${verified} verified</span>
    <span class="stat-pill stat-reject">${rejected} rejected</span>
    <span class="stat-pill stat-pending">${filtCount} filtered</span>
    <span class="stat-pill stat-qa">${qaCount} QA'd</span>`;
}

// ─────────────────────────────────────────────────────────────
//  THEME
// ─────────────────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
}

// ─────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────────────────────
//  KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
  if (e.key.toLowerCase() === 'a')                  selectAction('Approved');
  if (e.key.toLowerCase() === 'r')                  selectAction('Rejected');
  if (e.key === 'Enter')                            submitReview();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goNext();
});

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
init();
</script>
