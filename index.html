<!DOCTYPE html>
<html>
<head>
  <title>Video QC Dashboard</title>

  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f8; }

    h1 {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
      margin: 0;
    }

    .topbar {
      text-align: center;
      padding: 5px;
      font-size: 14px;
    }

    .container { display: flex; height: calc(100vh - 90px); }

    .table-section {
      width: 30%;
      background: white;
      border-right: 1px solid #ddd;
      overflow-y: auto;
    }

    .video-section {
      width: 70%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 80%;
      max-height: 60vh;
      border-radius: 12px;
      background: black;
    }

    .meta {
      margin-top: 10px;
      width: 80%;
      background: white;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    textarea {
      width: 80%;
      height: 80px;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
    }

    .buttons button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .approve { background: green; color: white; }
    .reject { background: red; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      background: #222;
      color: white;
      padding: 8px;
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    tr:hover { background: #f1f1f1; }

    .active { background: #d0ebff !important; }
  </style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href = "login.html";
</script>

<h1>🎥 Video QC Dashboard</h1>

<div class="topbar">
  Logged in as: <b id="userName"></b> |
  <span style="color:red; cursor:pointer;" onclick="logout()">Logout</span>
</div>

<div class="container">

  <div class="table-section">

    <div style="padding:10px;">
      <select id="enterpriseFilter" onchange="applyFilter()" style="width:100%; padding:8px;">
        <option value="all">All Enterprises</option>
      </select>

      <div style="font-size:12px; margin-top:5px;">
        Pending: <b id="pendingCount"></b> | Total: <b id="totalCount"></b>
      </div>
    </div>

    <table id="videoTable"></table>

  </div>

  <div class="video-section">

    <video id="player" controls></video>

    <div class="meta" id="meta"></div>

    <div class="buttons">
      <button class="approve" onclick="markQC('Approved')">Approve (A)</button>
      <button class="reject" onclick="markQC('Rejected')">Reject (R)</button>
    </div>

    <textarea id="comment" placeholder="Add comment..."></textarea>

  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?output=csv";
const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

let videos = [];
let filteredVideos = [];
let currentIndex = 0;

document.getElementById("userName").innerText = reviewer;

function logout() {
  localStorage.removeItem("qc_reviewer");
  window.location.href = "login.html";
}

function parseCSV(text) {
  const rows = [];
  let row = [], value = '', insideQuotes = false;

  for (let char of text) {
    if (char === '"') insideQuotes = !insideQuotes;
    else if (char === ',' && !insideQuotes) { row.push(value); value = ''; }
    else if (char === '\n' && !insideQuotes) { row.push(value); rows.push(row); row = []; value = ''; }
    else value += char;
  }

  row.push(value);
  rows.push(row);
  return rows;
}

fetch(SHEET_URL)
.then(res => res.text())
.then(csv => {
  const rows = parseCSV(csv);
  const headers = rows[0];

  videos = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  });

  populateFilter();
  applyFilter();
});

function populateFilter() {
  const dropdown = document.getElementById("enterpriseFilter");
  const unique = [...new Set(videos.map(v => v.enterprise_id))];

  unique.forEach(ent => {
    const opt = document.createElement("option");
    opt.value = ent;
    opt.textContent = ent;
    dropdown.appendChild(opt);
  });
}

function applyFilter() {
  const selected = document.getElementById("enterpriseFilter").value;

  filteredVideos = videos.filter(v => {
    if (v.status !== "done") return false;
    if (v.qc_status && v.qc_status.trim() !== "") return false;
    if (selected === "all") return true;
    return v.enterprise_id === selected;
  });

  updateStats();
  renderTable();

  if (filteredVideos.length > 0) playVideo(0);
}

function updateStats() {
  document.getElementById("pendingCount").innerText = filteredVideos.length;
  document.getElementById("totalCount").innerText = videos.length;
}

function renderTable() {
  let html = `<tr><th>Video ID</th></tr>`;

  for (let i = 0; i < filteredVideos.length; i++) {
    html += `<tr id="row-${i}" onclick="playVideo(${i})">
      <td>${filteredVideos[i].video_id}</td>
    </tr>`;
  }

  document.getElementById("videoTable").innerHTML = html;
}

function highlightRow(index) {
  document.querySelectorAll("tr").forEach(r => r.classList.remove("active"));
  const row = document.getElementById("row-" + index);
  if (row) row.classList.add("active");
}

function playVideo(index) {
  currentIndex = index;
  const v = filteredVideos[index];

  document.getElementById("player").src = v.video_url;

  document.getElementById("meta").innerHTML = `
    <b>Video ID:</b> ${v.video_id}<br>
    <b>Enterprise:</b> ${v.enterprise_id}<br>
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;

  highlightRow(index);
}

function markQC(status) {
  const v = filteredVideos[currentIndex];
  const comment = document.getElementById("comment").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      video_id: v.video_id,
      qc_status: status,
      qc_comment: comment,
      qc_done_by: reviewer
    })
  })
  .then(() => {
    filteredVideos.splice(currentIndex, 1);
    renderTable();
    updateStats();

    if (filteredVideos.length > 0) {
      playVideo(currentIndex % filteredVideos.length);
    } else {
      document.getElementById("player").src = "";
      document.getElementById("meta").innerHTML = "🎉 All videos reviewed";
    }
  });
}

/* ⌨️ Keyboard shortcuts */
document.addEventListener("keydown", (e) => {
  if (!filteredVideos.length) return;

  if (e.key === "a" || e.key === "A") markQC("Approved");
  if (e.key === "r" || e.key === "R") markQC("Rejected");

  if (e.key === "ArrowRight") playVideo((currentIndex + 1) % filteredVideos.length);
  if (e.key === "ArrowLeft") playVideo((currentIndex - 1 + filteredVideos.length) % filteredVideos.length);
});

</script>

</body>
</html>
