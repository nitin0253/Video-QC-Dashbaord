<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QA Dashboard</title>

<style>
:root {
  --bg: #0f172a;
  --text: #e2e8f0;
  --glass: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.15);
}

body.light {
  --bg: #f1f5f9;
  --text: #0f172a;
  --glass: rgba(255,255,255,0.6);
  --border: rgba(0,0,0,0.1);
}

body {
  margin:0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}

/* GLASS */
.glass {
  background: var(--glass);
  backdrop-filter: blur(14px);
  border:1px solid var(--border);
  border-radius:12px;
}

/* LAYOUT */
.container {
  display:flex;
  height: calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar {
  width:300px;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* FILTERS */
.filters {
  position:sticky;
  top:10px;
  z-index:10;
  padding:10px;
}

input, select {
  width:100%;
  padding:8px;
  margin-bottom:8px;
  border:none;
  border-radius:8px;
  background: var(--glass);
  color: var(--text);
}

/* BUTTONS */
.btn-row {
  display:flex;
  gap:10px;
}

.apply-btn {
  flex:1;
  background:#2563eb;
  color:white;
  padding:8px;
  border:none;
  border-radius:8px;
}

.clear-btn {
  flex:1;
  background:#dc2626;
  color:white;
  padding:8px;
  border:none;
  border-radius:8px;
}

/* VIDEO LIST */
.video-list {
  margin-top:10px;
  overflow-y:auto;
  flex:1;
}

.video-item {
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

.video-item:hover {
  background: var(--glass);
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

video {
  width:100%;
  border-radius:12px;
}

/* META */
.meta {
  margin-top:10px;
  padding:10px;
}

/* PANEL */
.panel {
  position:absolute;
  right:20px;
  top:80px;
}

.panel-content {
  display:none;
  flex-direction:column;
  gap:10px;
  padding:10px;
}

.panel.open .panel-content {
  display:flex;
}

/* REJECT BOX */
.reject-box {
  display:none;
  margin-top:10px;
  padding:10px;
}

.reject-box button {
  margin:4px;
  padding:6px;
  border:none;
  border-radius:6px;
  background: var(--glass);
  color: var(--text);
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: Nitin Kumar</div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="sidebar">

    <div class="filters glass">

      <select id="enterprise"></select>
      <select id="qcUser"></select>
      <select id="status">
        <option value="">All Status</option>
        <option value="verified">Verified</option>
        <option value="rejected">Rejected</option>
      </select>

      <input id="videoId" placeholder="Video ID">
      <input id="vin" placeholder="VIN">
      <input id="sku" placeholder="SKU">

      <div class="btn-row">
        <button class="apply-btn" onclick="applyFilters()">Apply</button>
        <button class="clear-btn" onclick="clearFilters()">Clear</button>
      </div>

    </div>

    <div id="videoList" class="video-list"></div>

  </div>

  <!-- RIGHT -->
  <div class="main">

    <video id="player" controls></video>

    <div id="meta" class="meta glass"></div>

    <div style="margin-top:10px;">
      <button onclick="markQC('Approved')" class="apply-btn">Approve (A)</button>
      <button onclick="markQC('Rejected')" class="clear-btn">Reject (R)</button>
    </div>

    <textarea id="comment" style="width:100%;margin-top:10px;" placeholder="Add comment"></textarea>

    <!-- REJECT REASONS -->
    <div id="rejectBox" class="reject-box glass">
      <b>Select Reason:</b><br>
      <button onclick="setReason('Voiceover Issue')">Voiceover</button>
      <button onclick="setReason('Background Music Issue')">Music</button>
      <button onclick="setReason('Image removeBG Issue')">removeBG</button>
      <button onclick="setReason('Transition Issue')">Transition</button>
      <button onclick="setReason('Data Issue')">Data</button>
      <button onclick="setReason('Image Selection Issue')">Selection</button>
      <button onclick="setReason('Repeated Images')">Repeated</button>
    </div>

  </div>

</div>

<!-- PANEL -->
<div class="panel glass" id="panel">
  <button onclick="togglePanel()">☰</button>
  <div class="panel-content glass">
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";

let videos = [];
let filtered = [];
let index = 0;

/* FETCH */
async function fetchData(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];

  videos = rows.slice(1).map(r=>{
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = r[i]);
    return obj;
  }).filter(v => v.video_id && v.video_id.startsWith("vid-"));

  filtered = videos;
  populateFilters();
  renderList();
}

/* FILTERS */
function populateFilters(){
  const ent = [...new Set(videos.map(v=>v.enterprise_name))];
  const qc = [...new Set(videos.map(v=>v.qc_user_email_id))];

  document.getElementById("enterprise").innerHTML =
    "<option value=''>All Enterprises</option>" +
    ent.map(e=>`<option>${e}</option>`).join("");

  document.getElementById("qcUser").innerHTML =
    "<option value=''>All QC Users</option>" +
    qc.map(e=>`<option>${e}</option>`).join("");
}

function applyFilters(){
  const e = enterprise.value.toLowerCase();
  const q = qcUser.value;
  const s = status.value;
  const vid = videoId.value.toLowerCase();
  const vinVal = vin.value.toLowerCase();
  const skuVal = sku.value.toLowerCase();

  filtered = videos.filter(v =>
    (!e || v.enterprise_name.toLowerCase().includes(e)) &&
    (!q || v.qc_user_email_id===q) &&
    (!s || v.verified_status===s) &&
    (!vid || v.video_id.toLowerCase().includes(vid)) &&
    (!vinVal || v.vin_name.toLowerCase().includes(vinVal)) &&
    (!skuVal || v.sku_id.toLowerCase().includes(skuVal))
  );

  index=0;
  renderList();
  playVideo();
}

function clearFilters(){
  document.querySelectorAll("input,select").forEach(el=>el.value="");
  filtered = videos;
  renderList();
}

/* LIST */
function renderList(){
  videoList.innerHTML = filtered.map((v,i)=>
    `<div class="video-item" onclick="selectVideo(${i})">${v.video_id}</div>`
  ).join("");
}

function selectVideo(i){
  index=i;
  playVideo();
}

/* PLAYER */
function playVideo(){
  const v = filtered[index];
  if(!v) return;

  player.src = v.video_url;

  meta.innerHTML = `
    <b>Video:</b> ${v.video_id}<br>
    <b>Enterprise:</b> ${v.enterprise_name}<br>
    <b>QC User:</b> ${v.qc_user_email_id}<br>
    <b>Status:</b> ${v.verified_status}<br>
    ${v.verified_status==="rejected" ? `<b>Reason:</b> ${v.rejected_reason}<br>` : ""}
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

/* QC */
function markQC(type){
  if(type==="Rejected"){
    rejectBox.style.display="block";
  } else {
    rejectBox.style.display="none";
    alert("Approved");
  }
}

function setReason(r){
  comment.value = r;
}

/* PANEL */
function togglePanel(){
  panel.classList.toggle("open");
}

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",
    document.body.classList.contains("light")?"light":"dark"
  );
}

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

/* LOGOUT */
function logout(){
  alert("Logged out");
}

fetchData();

</script>

</body>
</html>
