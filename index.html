<!DOCTYPE html>
<html>
<head>
<title>QA Dashboard</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #e2e8f0;
}

/* LIGHT THEME */
body.light {
  background: #f1f5f9;
  color: #0f172a;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background: rgba(0,0,0,0.6);
}

/* LAYOUT */
.container { display:flex; height:calc(100vh - 60px); }

/* GLASS */
.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}

/* SIDEBAR */
.sidebar {
  width:30%;
  padding:10px;
  overflow-y:auto;
}

/* STICKY FILTER BAR */
.filter-row {
  position: sticky;
  top: 0;
  z-index: 10;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  padding:10px;
  margin-bottom:10px;
}

/* INPUTS */
input, select {
  padding:8px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  min-width:130px;
}

body.light input,
body.light select {
  background:#fff;
  color:#000;
}

/* BUTTONS */
button {
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.apply-btn { background:#2563eb; color:white; }
.clear-btn { background:#ef4444; color:white; }

/* TABLE */
table { width:100%; border-collapse:collapse; }
td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; }
tr:hover { background:rgba(255,255,255,0.05); }

/* MAIN */
.main {
  width:70%;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

video {
  width:75%;
  border-radius:12px;
}

.meta {
  width:75%;
  margin-top:10px;
  padding:12px;
}

textarea {
  width:75%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

/* PANEL */
.side-panel {
  position:fixed;
  right:0;
  top:80px;
  width:50px;
  transition:0.3s;
}

.side-panel.expanded { width:160px; }

.panel-content {
  display:none;
  flex-direction:column;
}

.side-panel.expanded .panel-content { display:flex; }

</style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href="login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar glass">

  <div class="filter-row glass">

    <select id="enterpriseFilter">
      <option value="all">All Enterprises</option>
    </select>

    <select id="qcUserFilter">
      <option value="all">All QC Users</option>
    </select>

    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="verified">Verified</option>
      <option value="rejected">Rejected</option>
    </select>

    <input id="videoSearch" placeholder="Video ID">
    <input id="vinFilter" placeholder="VIN">
    <input id="skuFilter" placeholder="SKU">

    <button class="apply-btn" onclick="applyFilter()">Apply</button>
    <button id="clearBtn" class="clear-btn" onclick="clearFilters()" style="display:none;">✖</button>

  </div>

  <table id="videoTable"></table>

</div>

<!-- MAIN -->
<div class="main">

  <video id="player" controls></video>

  <div id="meta" class="meta glass"></div>

  <div>
    <button onclick="markQC('Approved')" style="background:green;color:white;">Approve (A)</button>
    <button onclick="markQC('Rejected')" style="background:red;color:white;">Reject (R)</button>
  </div>

  <textarea id="comment" placeholder="Add comment..."></textarea>

</div>

</div>

<!-- PANEL -->
<div id="panel" class="side-panel glass">
  <div onclick="togglePanel()">☰</div>
  <div class="panel-content">
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";

let videos=[];
let filteredVideos=[];
let currentIndex=0;

document.getElementById("userName").innerText=reviewer;

/* CSV PARSER (FIXED) */
function parseCSV(text){
  const rows = text.split("\n");
  return rows.map(row=>{
    const result=[];
    let current="", inside=false;
    for(let char of row){
      if(char === '"' ){ inside=!inside; continue; }
      if(char === "," && !inside){
        result.push(current);
        current="";
      } else {
        current+=char;
      }
    }
    result.push(current);
    return result;
  });
}

/* FETCH */
fetch(SHEET_URL)
.then(r=>r.text())
.then(csv=>{
  const data=parseCSV(csv);
  const headers=data[0].map(h=>h.trim());

  videos=data.slice(1).map(row=>{
    let obj={};
    headers.forEach((h,i)=> obj[h]=row[i]);
    return obj;
  }).filter(v=>v["v.video_id"] && v["v.video_id"].startsWith("vid-")); // REMOVE GARBAGE

  populateFilters();
  applyFilter();
});

/* FILTER OPTIONS */
function populateFilters(){
  const ent=new Set();
  const qc=new Set();

  videos.forEach(v=>{
    ent.add(v.enterprise_name);
    if(v.qc_user_email_id?.includes("@")) qc.add(v.qc_user_email_id);
  });

  ent.forEach(v=>addOption("enterpriseFilter",v));
  qc.forEach(v=>addOption("qcUserFilter",v));
}

function addOption(id,val){
  const o=document.createElement("option");
  o.value=val;
  o.textContent=val;
  document.getElementById(id).appendChild(o);
}

/* FILTER */
function applyFilter(){

  const ent=document.getElementById("enterpriseFilter").value;
  const qc=document.getElementById("qcUserFilter").value;
  const status=document.getElementById("statusFilter").value;

  const vid=document.getElementById("videoSearch").value.toLowerCase();
  const vin=document.getElementById("vinFilter").value.toLowerCase();
  const sku=document.getElementById("skuFilter").value.toLowerCase();

  filteredVideos=videos.filter(v=>{
    if(ent!=="all" && v.enterprise_name!==ent) return false;
    if(qc!=="all" && v.qc_user_email_id!==qc) return false;
    if(status!=="all" && v.verified_status!==status) return false;

    if(vid && !v["v.video_id"].toLowerCase().includes(vid)) return false;
    if(vin && !v.vin_name?.toLowerCase().includes(vin)) return false;
    if(sku && !v.sku_id?.toLowerCase().includes(sku)) return false;

    return true;
  });

  document.getElementById("clearBtn").style.display =
    (ent!=="all" || qc!=="all" || status!=="all" || vid || vin || sku)
    ? "block" : "none";

  renderTable();
  if(filteredVideos.length) playVideo(0);
}

/* CLEAR FILTERS */
function clearFilters(){
  document.getElementById("enterpriseFilter").value="all";
  document.getElementById("qcUserFilter").value="all";
  document.getElementById("statusFilter").value="all";
  document.getElementById("videoSearch").value="";
  document.getElementById("vinFilter").value="";
  document.getElementById("skuFilter").value="";
  applyFilter();
}

/* TABLE */
function renderTable(){
  let html="";
  filteredVideos.forEach((v,i)=>{
    html+=`<tr onclick="playVideo(${i})"><td>${v["v.video_id"]}</td></tr>`;
  });
  document.getElementById("videoTable").innerHTML=html;
}

/* PLAYER */
function playVideo(i){
  currentIndex=i;
  const v=filteredVideos[i];

  document.getElementById("player").src=v.video_url;

  document.getElementById("meta").innerHTML=`
    <b>Video:</b> ${v["v.video_id"]}<br>
    <b>Enterprise:</b> ${v.enterprise_name}<br>
    <b>QC User:</b> ${v.qc_user_email_id}<br>
    <b>Status:</b> ${v.verified_status}<br>
    ${v.verified_status==="rejected" ? `<b>Reason:</b> ${v.rejected_reason}<br>` : ""}
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

/* UI */
function togglePanel(){
  document.getElementById("panel").classList.toggle("expanded");
}

/* THEME FIX */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}

/* LOAD THEME */
if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

function logout(){
  localStorage.removeItem("qc_reviewer");
  window.location.href="login.html";
}

</script>

</body>
</html>
