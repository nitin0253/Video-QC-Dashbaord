<!DOCTYPE html>
<html>
<head>
<title>QA Dashboard</title>

<style>
:root {
  --bg:#0f172a;
  --panel:#1e293b;
  --text:#e2e8f0;
  --border:rgba(255,255,255,0.1);
}

body.light {
  --bg:#f1f5f9;
  --panel:#ffffff;
  --text:#0f172a;
  --border:#e2e8f0;
}

body {
  margin:0;
  font-family: Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#020617;
}

/* LAYOUT */
.container {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  width:30%;
  display:flex;
  flex-direction:column;
  border-right:1px solid var(--border);
}

/* FILTERS */
.filters {
  padding:12px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

/* GRID FIX (alignment issue solved) */
.filter-grid {
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
}

.filter-grid input,
.filter-grid select {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

/* BUTTON ROW */
.btn-row {
  display:flex;
  gap:10px;
}

.apply-btn {
  flex:1;
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
}

.clear-btn {
  flex:1;
  background:#dc2626;
  color:white;
  padding:10px;
  border:none;
  border-radius:8px;
}

/* VIDEO LIST */
.video-list {
  flex:1;
  overflow-y:auto;
}

.video-list td {
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

/* MAIN */
.main {
  width:70%;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

video {
  width:75%;
  border-radius:10px;
}

.meta {
  width:75%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  background:var(--panel);
}

/* COLLAPSIBLE PANEL (GMAIL STYLE) */
.panel {
  position:fixed;
  right:10px;
  top:70px;
}

.panel-btn {
  background:var(--panel);
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

.panel-content {
  display:none;
  margin-top:5px;
  background:var(--panel);
  border-radius:8px;
  padding:8px;
}

.panel-content button {
  width:100%;
  margin:4px 0;
  padding:8px;
  border:none;
  border-radius:6px;
  background:rgba(255,255,255,0.1);
  color:var(--text);
}

.panel.open .panel-content {
  display:block;
}

</style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href="login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="filters">
    <div class="filter-grid">

      <select id="enterpriseFilter">
        <option value="all">All Enterprises</option>
      </select>

      <select id="qcUserFilter">
        <option value="all">All QC Users</option>
      </select>

      <select id="statusFilter">
        <option value="all">All Status</option>
        <option value="verified">Verified</option>
        <option value="rejected">Rejected</option>
      </select>

      <input id="videoSearch" placeholder="Video ID">
      <input id="vinFilter" placeholder="VIN">
      <input id="skuFilter" placeholder="SKU">

      <div class="btn-row">
        <button class="apply-btn" onclick="applyFilter()">Apply</button>
        <button class="clear-btn" onclick="clearFilters()">Clear</button>
      </div>

    </div>
  </div>

  <div class="video-list">
    <table id="videoTable"></table>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <video id="player" controls></video>

  <div id="meta" class="meta"></div>

  <div>
    <button onclick="markQC('Approved')" style="background:green;color:white;">Approve (A)</button>
    <button onclick="markQC('Rejected')" style="background:red;color:white;">Reject (R)</button>
  </div>

  <textarea id="comment" placeholder="Add comment..."></textarea>

</div>

</div>

<!-- COLLAPSIBLE PANEL -->
<div id="panel" class="panel">
  <div class="panel-btn" onclick="togglePanel()">☰</div>

  <div class="panel-content">
    <button onclick="toggleTheme()">Toggle Theme</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";

let videos=[], filteredVideos=[], currentIndex=0;

document.getElementById("userName").innerText=reviewer;

/* FETCH */
fetch(SHEET_URL)
.then(r=>r.text())
.then(csv=>{
  const rows = csv.split("\n").map(r=>r.split(","));
  const headers = rows[0];

  videos = rows.slice(1).map(row=>{
    let obj={};
    headers.forEach((h,i)=>obj[h]=row[i]);
    return obj;
  }).filter(v=>v["v.video_id"]?.startsWith("vid-"));

  populateFilters();
  applyFilter();
});

/* FILTER OPTIONS */
function populateFilters(){
  const ent=new Set(), qc=new Set();

  videos.forEach(v=>{
    ent.add(v.enterprise_name);
    if(v.qc_user_email_id?.includes("@")) qc.add(v.qc_user_email_id);
  });

  ent.forEach(v=>addOption("enterpriseFilter",v));
  qc.forEach(v=>addOption("qcUserFilter",v));
}

function addOption(id,val){
  let o=document.createElement("option");
  o.value=val;
  o.textContent=val;
  document.getElementById(id).appendChild(o);
}

/* FILTER */
function applyFilter(){
  const ent=enterpriseFilter.value;
  const qc=qcUserFilter.value;
  const status=statusFilter.value;

  const vid=videoSearch.value.toLowerCase();
  const vin=vinFilter.value.toLowerCase();
  const sku=skuFilter.value.toLowerCase();

  filteredVideos = videos.filter(v=>{
    if(ent!=="all" && v.enterprise_name!==ent) return false;
    if(qc!=="all" && v.qc_user_email_id!==qc) return false;
    if(status!=="all" && v.verified_status!==status) return false;
    if(vid && !v["v.video_id"].toLowerCase().includes(vid)) return false;
    if(vin && !v.vin_name?.toLowerCase().includes(vin)) return false;
    if(sku && !v.sku_id?.toLowerCase().includes(sku)) return false;
    return true;
  });

  renderTable();
  if(filteredVideos.length) playVideo(0);
}

/* CLEAR */
function clearFilters(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  document.querySelectorAll("select").forEach(s=>s.value="all");
  applyFilter();
}

/* TABLE */
function renderTable(){
  videoTable.innerHTML = filteredVideos.map((v,i)=>
    `<tr onclick="playVideo(${i})"><td>${v["v.video_id"]}</td></tr>`
  ).join("");
}

/* PLAYER */
function playVideo(i){
  const v=filteredVideos[i];
  player.src=v.video_url;

  meta.innerHTML=`
    <b>Video:</b> ${v["v.video_id"]}<br>
    <b>Enterprise:</b> ${v.enterprise_name}<br>
    <b>QC User:</b> ${v.qc_user_email_id}<br>
    <b>Status:</b> ${v.verified_status}<br>
    ${v.verified_status==="rejected" ? `<b>Reason:</b> ${v.rejected_reason}<br>` : ""}
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

/* PANEL */
function togglePanel(){
  document.getElementById("panel").classList.toggle("open");
}

/* THEME FIX (FULL UI SWITCH) */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}

/* LOAD THEME */
if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

function logout(){
  localStorage.removeItem("qc_reviewer");
  location.href="login.html";
}

</script>

</body>
</html>
