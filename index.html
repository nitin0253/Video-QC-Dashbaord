<!DOCTYPE html>
<html>
<head>
  <title>Video QC Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .table-section {
      width: 60%;
      background: white;
      padding: 10px;
      border-radius: 10px;
      height: 80vh;
      overflow-y: scroll;
    }

    .video-section {
      width: 40%;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td, th {
      padding: 8px;
      border-bottom: 1px solid #ddd;
      cursor: pointer;
    }

    tr:hover {
      background: #f0f0f0;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    .buttons button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .approve { background: green; color: white; }
    .reject { background: red; color: white; }

  </style>
</head>

<body>

<h1>🎥 Video QC Dashboard</h1>

<div class="container">

  <div class="table-section">
    <table id="videoTable"></table>
  </div>

  <div class="video-section">
    <video id="player" controls></video>

    <div class="buttons">
      <button class="approve" onclick="markQC('Approved')">Approve</button>
      <button class="reject" onclick="markQC('Rejected')">Reject</button>
    </div>

    <textarea id="comment" placeholder="Add comment..." style="width:100%; height:80px;"></textarea>
  </div>

</div>

<script>

const SHEET_URL = "PASTE_YOUR_CSV_LINK_HERE";

let videos = [];
let currentIndex = null;

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));
    const headers = rows[0];

    videos = rows.slice(1).map(row => {
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = row[i]);
      return obj;
    });

    renderTable();
  });

function renderTable() {
  const table = document.getElementById("videoTable");

  table.innerHTML = `
    <tr>
      <th>Video ID</th>
      <th>Status</th>
    </tr>
  `;

  videos.forEach((v, i) => {
    if (v.status !== "done") return;

    table.innerHTML += `
      <tr onclick="playVideo(${i})">
        <td>${v.video_id}</td>
        <td>${v.verified_status}</td>
      </tr>
    `;
  });
}

function playVideo(index) {
  currentIndex = index;
  document.getElementById("player").src = videos[index].video_url;
}

function markQC(status) {
  if (currentIndex === null) return;

  const comment = document.getElementById("comment").value;

  alert(`
QC Marked:
Video: ${videos[currentIndex].video_id}
Status: ${status}
Comment: ${comment}

(Note: This is demo. Data not saved yet)
  `);
}

</script>

</body>
</html>
