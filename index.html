<!DOCTYPE html>
<html>
<head>
  <title>Video QC Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    h1 {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
      margin: 0;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .table-section {
      width: 35%;
      overflow-y: scroll;
      background: white;
      border-right: 1px solid #ddd;
    }

    .video-section {
      width: 65%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    video {
      width: 80%;
      max-height: 60vh;
      border-radius: 12px;
      background: black;
    }

    .meta {
      margin-top: 15px;
      width: 80%;
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .approve { background: green; color: white; }
    .reject { background: red; color: white; }

    textarea {
      width: 80%;
      height: 80px;
      margin-top: 10px;
      border-radius: 6px;
      padding: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      background: #222;
      color: white;
      padding: 8px;
      position: sticky;
      top: 0;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    tr:hover {
      background: #f1f1f1;
    }

  </style>
</head>

<body>

<h1>🎥 Video QC Dashboard</h1>

<div class="container">

  <!-- LEFT TABLE -->
  <div class="table-section">
    <table id="videoTable"></table>
  </div>

  <!-- CENTER PLAYER -->
  <div class="video-section">

    <video id="player" controls></video>

    <div class="meta" id="meta"></div>

    <div class="buttons">
      <button class="approve" onclick="markQC('Approved')">Approve</button>
      <button class="reject" onclick="markQC('Rejected')">Reject</button>
    </div>

    <textarea id="comment" placeholder="Add comment..."></textarea>

  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=0&single=true&output=csv";

let videos = [];
let currentIndex = null;

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").map(r => r.split(","));
    const headers = rows[0];

    videos = rows.slice(1).map(row => {
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = row[i]);
      return obj;
    });

    renderTable();
  });

function renderTable() {
  const table = document.getElementById("videoTable");

  table.innerHTML = `
    <tr>
      <th>Video ID</th>
      <th>Enterprise</th>
      <th>Verified</th>
      <th>Created</th>
    </tr>
  `;

  videos.forEach((v, i) => {
    if (v.status !== "done") return;

    table.innerHTML += `
      <tr onclick="playVideo(${i})">
        <td>${v.video_id}</td>
        <td>${v.enterprise_id}</td>
        <td>${v.verified_status}</td>
        <td>${v.created_on}</td>
      </tr>
    `;
  });
}

function playVideo(index) {
  currentIndex = index;

  const v = videos[index];

  document.getElementById("player").src = v.video_url;

  document.getElementById("meta").innerHTML = `
    <b>Video ID:</b> ${v.video_id}<br>
    <b>Enterprise ID:</b> ${v.enterprise_id}<br>
    <b>Verified:</b> ${v.verified_status}<br>
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

function markQC(status) {
  if (currentIndex === null) return;

  const v = videos[currentIndex];
  const comment = document.getElementById("comment").value;

  alert(`
QC Marked:
Video: ${v.video_id}
Status: ${status}
Comment: ${comment}

(Note: Not saved yet)
  `);
}

</script>

</body>
</html>
