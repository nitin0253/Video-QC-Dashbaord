<!DOCTYPE html>
<html>
<head>
  <title>QA Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: #f4f6f8;
    }

    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #111;
      color: white;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 28%;
      background: white;
      overflow-y: auto;
      border-right: 1px solid #ddd;
    }

    body.dark .sidebar {
      background: #1e293b;
    }

    .filter {
      padding: 10px;
    }

    .filter input, .filter select {
      width: 100%;
      margin: 5px 0;
      padding: 6px;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #222;
      color: white;
      padding: 8px;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .main {
      width: 72%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }

    video {
      width: 75%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .meta {
      width: 75%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      background: white;
    }

    body.dark .meta {
      background: #1e293b;
    }

    textarea {
      width: 75%;
      margin-top: 10px;
      padding: 10px;
    }

    .buttons button {
      margin: 5px;
      padding: 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }

    .approve { background: green; color: white; }
    .reject { background: red; color: white; }

    /* SIDE PANEL */
    .side-panel {
      position: fixed;
      top: 80px;
      right: 0;
      width: 50px;
      background: #fff;
      border-radius: 10px 0 0 10px;
      box-shadow: -2px 0 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .side-panel.expanded {
      width: 180px;
    }

    .menu-btn {
      padding: 12px;
      cursor: pointer;
      text-align: center;
      font-size: 20px;
    }

    .panel-content {
      display: none;
      flex-direction: column;
      padding: 10px;
    }

    .side-panel.expanded .panel-content {
      display: flex;
    }

    .panel-content button {
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href = "login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

  <!-- FILTERS -->
  <div class="sidebar">
    <div class="filter">

      <select id="enterpriseIdFilter" onchange="applyFilter()">
        <option value="all">All Enterprise IDs</option>
      </select>

      <input type="text" id="enterpriseNameFilter" placeholder="Search Enterprise Name"
        oninput="applyFilter()">

      <select id="qcUserFilter" onchange="applyFilter()">
        <option value="all">All QC Users</option>
      </select>

      <select id="statusFilter" onchange="applyFilter()">
        <option value="all">All Status</option>
        <option value="verified">Verified</option>
        <option value="rejected">Rejected</option>
      </select>

      <input id="videoSearch" placeholder="Video ID" oninput="applyFilter()">
      <input id="vinFilter" placeholder="VIN" oninput="applyFilter()">
      <input id="skuFilter" placeholder="SKU" oninput="applyFilter()">

      <label>Created Date</label>
      <input type="date" id="createdFrom" onchange="applyFilter()">
      <input type="date" id="createdTo" onchange="applyFilter()">

      <label>Updated Date</label>
      <input type="date" id="updatedFrom" onchange="applyFilter()">
      <input type="date" id="updatedTo" onchange="applyFilter()">

    </div>

    <table id="videoTable"></table>
  </div>

  <!-- PLAYER -->
  <div class="main">
    <video id="player" controls></video>
    <div id="meta" class="meta"></div>

    <div class="buttons">
      <button class="approve" onclick="markQC('Approved')">Approve (A)</button>
      <button class="reject" onclick="markQC('Rejected')">Reject (R)</button>
    </div>

    <textarea id="comment" placeholder="Add comment..."></textarea>
  </div>

</div>

<!-- SIDE PANEL -->
<div id="sidePanel" class="side-panel">
  <div class="menu-btn" onclick="togglePanel()">☰</div>
  <div class="panel-content">
    <button onclick="toggleTheme()">🌗 Theme</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";
const API_URL = "PASTE_YOUR_SCRIPT_URL";

let videos = [];
let filteredVideos = [];
let currentIndex = 0;

document.getElementById("userName").innerText = reviewer;

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const parsed = parseCSV(csv);

    const headers = parsed[0];

    videos = parsed.slice(1).map(row => {
      let obj = {};
      headers.forEach((h, i) => {
        obj[h.trim()] = row[i];
      });
      return obj;
    });

    populateFilters();
    applyFilter();
  });

function populateFilters() {
  const enterpriseSet = new Set();
  const qcUserSet = new Set();

  videos.forEach(v => {
    if (v["v.enterprise_id"]) enterpriseSet.add(v["v.enterprise_id"]);

    if (v.qc_user_email_id && v.qc_user_email_id.includes("@")) {
      qcUserSet.add(v.qc_user_email_id);
    }
  });

  enterpriseSet.forEach(v => addOption("enterpriseIdFilter", v));
  qcUserSet.forEach(v => addOption("qcUserFilter", v));
}

function addOption(id, val) {
  const opt = document.createElement("option");
  opt.value = val;
  opt.textContent = val;
  document.getElementById(id).appendChild(opt);
}

function applyFilter() {

  const enterpriseId = document.getElementById("enterpriseIdFilter").value;
  const enterpriseName = document.getElementById("enterpriseNameFilter").value.toLowerCase();
  const qcUser = document.getElementById("qcUserFilter").value;
  const status = document.getElementById("statusFilter").value;

  const videoSearch = document.getElementById("videoSearch").value.toLowerCase();
  const vin = document.getElementById("vinFilter").value.toLowerCase();
  const sku = document.getElementById("skuFilter").value.toLowerCase();

  const createdFrom = document.getElementById("createdFrom").value;
  const createdTo = document.getElementById("createdTo").value;

  const updatedFrom = document.getElementById("updatedFrom").value;
  const updatedTo = document.getElementById("updatedTo").value;

  filteredVideos = videos.filter(v => {

    if (enterpriseId !== "all" && v["v.enterprise_id"] !== enterpriseId) return false;
    if (enterpriseName && !v.enterprise_name.toLowerCase().includes(enterpriseName)) return false;
    if (qcUser !== "all" && v.qc_user_email_id !== qcUser) return false;
    if (status !== "all" && v.verified_status !== status) return false;

    if (videoSearch && !v["v.video_id"].toLowerCase().includes(videoSearch)) return false;
    if (vin && !v.vin_name.toLowerCase().includes(vin)) return false;
    if (sku && !v.sku_id.toLowerCase().includes(sku)) return false;

    const created = new Date(v.created_on.replace(",", ""));
    const updated = new Date(v.updated_on.replace(",", ""));

    if (createdFrom && created < new Date(createdFrom)) return false;
    if (createdTo && created > new Date(createdTo)) return false;

    if (updatedFrom && updated < new Date(updatedFrom)) return false;
    if (updatedTo && updated > new Date(updatedTo)) return false;

    return true;
  });

  renderTable();

  if (filteredVideos.length > 0) playVideo(0);
}

function renderTable() {
  let html = `<tr><th>Video</th></tr>`;
  filteredVideos.forEach((v,i) => {
    html += `<tr onclick="playVideo(${i})"><td>${v["v.video_id"]}</td></tr>`;
  });
  document.getElementById("videoTable").innerHTML = html;
}

function playVideo(i) {
  currentIndex = i;
  const v = filteredVideos[i];

  document.getElementById("player").src = v.video_url;

  document.getElementById("meta").innerHTML = `
    <b>Video:</b> ${v["v.video_id"]}<br>
    <b>Enterprise:</b> ${v.enterprise_name}<br>
    <b>QC User:</b> ${v.qc_user_email_id}<br>
    <b>Status:</b> ${v.verified_status}<br>
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

function markQC(status) {
  console.log("QC:", status);
}

function togglePanel() {
  document.getElementById("sidePanel").classList.toggle("expanded");
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}

function logout() {
  localStorage.removeItem("qc_reviewer");
  window.location.href = "login.html";
}

</script>

</body>
</html>
