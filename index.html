<!DOCTYPE html>
<html>
<head>
<title>QA Dashboard</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:#020617;
  font-size:18px;
}

/* LAYOUT */
.container {
  display:flex;
  height:calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  width:30%;
  display:flex;
  flex-direction:column;
  border-right:1px solid rgba(255,255,255,0.1);
}

/* FILTER SECTION (FIXED HEIGHT, NO OVERLAP) */
.filters {
  padding:10px;
  background:#1e293b;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.filters input,
.filters select {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
  background:#334155;
  color:white;
}

/* BUTTONS */
.apply-btn {
  background:#2563eb;
  color:white;
  padding:8px;
  width:48%;
}

.clear-btn {
  background:#dc2626;
  color:white;
  padding:8px;
  width:48%;
}

/* VIDEO LIST */
.video-list {
  flex:1;
  overflow-y:auto;
}

.video-list table {
  width:100%;
  border-collapse:collapse;
}

.video-list td {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
}

.video-list tr:hover {
  background:#1e293b;
}

/* MAIN */
.main {
  width:70%;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

video {
  width:75%;
  border-radius:10px;
}

.meta {
  margin-top:10px;
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  width:75%;
}

textarea {
  width:75%;
  margin-top:10px;
  padding:10px;
  border-radius:6px;
  border:none;
}

/* SIDE PANEL (OLD STYLE RESTORED) */
.panel {
  position:fixed;
  right:10px;
  top:70px;
}

.panel button {
  display:block;
  margin:5px 0;
  padding:6px 10px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href="login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

  <!-- FILTERS -->
  <div class="filters">

    <select id="enterpriseFilter">
      <option value="all">All Enterprises</option>
    </select>

    <select id="qcUserFilter">
      <option value="all">All QC Users</option>
    </select>

    <select id="statusFilter">
      <option value="all">All Status</option>
      <option value="verified">Verified</option>
      <option value="rejected">Rejected</option>
    </select>

    <input id="videoSearch" placeholder="Video ID">
    <input id="vinFilter" placeholder="VIN">
    <input id="skuFilter" placeholder="SKU">

    <div style="display:flex; justify-content:space-between;">
      <button class="apply-btn" onclick="applyFilter()">Apply</button>
      <button class="clear-btn" onclick="clearFilters()">Clear</button>
    </div>

  </div>

  <!-- VIDEO LIST -->
  <div class="video-list">
    <table id="videoTable"></table>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <video id="player" controls></video>

  <div id="meta" class="meta"></div>

  <div>
    <button onclick="markQC('Approved')" style="background:green;color:white;">Approve (A)</button>
    <button onclick="markQC('Rejected')" style="background:red;color:white;">Reject (R)</button>
  </div>

  <textarea id="comment" placeholder="Add comment..."></textarea>

</div>

</div>

<!-- OLD SIMPLE PANEL -->
<div class="panel">
  <button onclick="toggleTheme()">Theme</button>
  <button onclick="logout()">Logout</button>
</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&single=true&output=csv";

let videos=[];
let filteredVideos=[];
let currentIndex=0;

document.getElementById("userName").innerText=reviewer;

/* CSV PARSER FIX */
function parseCSV(text){
  return text.split("\n").map(r=>r.split(","));
}

/* FETCH */
fetch(SHEET_URL)
.then(r=>r.text())
.then(csv=>{
  const rows=parseCSV(csv);
  const headers=rows[0];

  videos=rows.slice(1).map(row=>{
    let obj={};
    headers.forEach((h,i)=> obj[h]=row[i]);
    return obj;
  }).filter(v=>v["v.video_id"] && v["v.video_id"].startsWith("vid-"));

  populateFilters();
  applyFilter();
});

/* FILTER OPTIONS */
function populateFilters(){
  const ent=new Set();
  const qc=new Set();

  videos.forEach(v=>{
    ent.add(v.enterprise_name);
    if(v.qc_user_email_id?.includes("@")) qc.add(v.qc_user_email_id);
  });

  ent.forEach(v=>addOption("enterpriseFilter",v));
  qc.forEach(v=>addOption("qcUserFilter",v));
}

function addOption(id,val){
  const o=document.createElement("option");
  o.value=val;
  o.textContent=val;
  document.getElementById(id).appendChild(o);
}

/* FILTER */
function applyFilter(){

  const ent=document.getElementById("enterpriseFilter").value;
  const qc=document.getElementById("qcUserFilter").value;
  const status=document.getElementById("statusFilter").value;

  const vid=document.getElementById("videoSearch").value.toLowerCase();
  const vin=document.getElementById("vinFilter").value.toLowerCase();
  const sku=document.getElementById("skuFilter").value.toLowerCase();

  filteredVideos=videos.filter(v=>{
    if(ent!=="all" && v.enterprise_name!==ent) return false;
    if(qc!=="all" && v.qc_user_email_id!==qc) return false;
    if(status!=="all" && v.verified_status!==status) return false;

    if(vid && !v["v.video_id"].toLowerCase().includes(vid)) return false;
    if(vin && !v.vin_name?.toLowerCase().includes(vin)) return false;
    if(sku && !v.sku_id?.toLowerCase().includes(sku)) return false;

    return true;
  });

  renderTable();
  if(filteredVideos.length) playVideo(0);
}

/* CLEAR */
function clearFilters(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  document.querySelectorAll("select").forEach(s=>s.value="all");
  applyFilter();
}

/* TABLE */
function renderTable(){
  let html="";
  filteredVideos.forEach((v,i)=>{
    html+=`<tr onclick="playVideo(${i})"><td>${v["v.video_id"]}</td></tr>`;
  });
  document.getElementById("videoTable").innerHTML=html;
}

/* PLAYER */
function playVideo(i){
  currentIndex=i;
  const v=filteredVideos[i];

  document.getElementById("player").src=v.video_url;

  document.getElementById("meta").innerHTML=`
    <b>Video:</b> ${v["v.video_id"]}<br>
    <b>Enterprise:</b> ${v.enterprise_name}<br>
    <b>QC User:</b> ${v.qc_user_email_id}<br>
    <b>Status:</b> ${v.verified_status}<br>
    ${v.verified_status==="rejected" ? `<b>Reason:</b> ${v.rejected_reason}<br>` : ""}
    <b>Created:</b> ${v.created_on}<br>
    <b>Updated:</b> ${v.updated_on}
  `;
}

/* THEME */
function toggleTheme(){
  if(document.body.style.background=="white"){
    document.body.style.background="#0f172a";
    document.body.style.color="white";
  } else {
    document.body.style.background="white";
    document.body.style.color="black";
  }
}

function logout(){
  localStorage.removeItem("qc_reviewer");
  window.location.href="login.html";
}

</script>

</body>
</html>
