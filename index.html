<!DOCTYPE html>
<html>
<head>
<title>QA Dashboard</title>

<style>
:root {
  --bg:#0f172a;
  --text:#e2e8f0;
  --glass:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.15);
}

body.light {
  --bg:#f1f5f9;
  --text:#0f172a;
  --glass:rgba(255,255,255,0.6);
  --border:rgba(0,0,0,0.1);
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:var(--glass);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}

/* LAYOUT */
.container {
  display:flex;
  height:calc(100vh - 55px);
}

/* GLASS */
.glass {
  background:var(--glass);
  backdrop-filter:blur(14px);
  border:1px solid var(--border);
  border-radius:12px;
}

/* SIDEBAR */
.sidebar {
  width:30%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* FILTERS */
.filters {
  padding:12px;
}

.filter-grid {
  display:flex;
  flex-direction:column;
  gap:12px;
}

.filter-grid input,
.filter-grid select {
  width:100%;
  height:42px;
  padding:0 12px;
  border-radius:10px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.12);
  color:var(--text);
}

.btn-row {
  display:flex;
  gap:12px;
}

.apply-btn,
.clear-btn {
  flex:1;
  height:42px;
  border-radius:10px;
  border:none;
  color:white;
}

.apply-btn { background:#2563eb; }
.clear-btn { background:#dc2626; }

/* VIDEO LIST */
.video-list {
  flex:1;
  overflow-y:auto;
}

.video-list td {
  padding:10px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
}

/* MAIN */
.main {
  width:70%;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

video {
  width:75%;
  border-radius:10px;
}

.meta {
  width:75%;
  padding:12px;
  margin-top:10px;
}

/* PANEL */
.panel {
  position:fixed;
  bottom:20px;
  right:20px;
}

.panel-btn {
  padding:12px;
  cursor:pointer;
}

.panel-content {
  display:none;
  margin-bottom:10px;
  padding:10px;
  background:var(--glass);
  backdrop-filter:blur(12px);
}

.panel.open .panel-content {
  display:block;
}

.panel-content button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  background:var(--glass);
  border:none;
  color:var(--text);
}

/* REJECTION */
.rejection-box {
  display:none;
  margin-top:10px;
  width:75%;
  padding:10px;
}

.rejection-box button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#ef4444;
  color:white;
}

textarea {
  width:75%;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--text);
}

</style>
</head>

<body>

<script>
const reviewer = localStorage.getItem("qc_reviewer");
if (!reviewer) window.location.href="login.html";
</script>

<div class="header">
  <div>🎥 QA Dashboard</div>
  <div id="videoCount"></div>
  <div>Logged in: <b id="userName"></b></div>
</div>

<div class="container">

<div class="sidebar">

<div class="filters glass">
<div class="filter-grid">

<select id="enterpriseFilter"></select>
<select id="qcUserFilter"></select>

<select id="statusFilter">
<option value="all">All Status</option>
<option value="verified">Verified</option>
<option value="rejected">Rejected</option>
</select>

<input id="videoSearch" placeholder="Video ID">
<input id="vinFilter" placeholder="VIN">
<input id="skuFilter" placeholder="SKU">

<div class="btn-row">
<button class="apply-btn" onclick="applyFilter()">Apply</button>
<button class="clear-btn" onclick="clearFilters()">Clear</button>
</div>

</div>
</div>

<div class="video-list">
<table id="videoTable"></table>
</div>

</div>

<div class="main">

<video id="player" controls></video>

<div id="meta" class="meta glass"></div>

<div>
<button onclick="markQC('Approved')" style="background:green;color:white;">Approve (A)</button>
<button onclick="markQC('Rejected')" style="background:red;color:white;">Reject (R)</button>
</div>

<textarea id="comment" placeholder="Add comment..."></textarea>

<div id="rejectBox" class="rejection-box glass">
<b>Quick Reasons:</b><br>
<button onclick="setReason('Voiceover Issue')">Voiceover</button>
<button onclick="setReason('Background Music Issue')">Music</button>
<button onclick="setReason('Image removeBG Issue')">removeBG</button>
<button onclick="setReason('Transition Issue')">Transition</button>
<button onclick="setReason('Data Issue')">Data</button>
<button onclick="setReason('Image Selection Issue')">Selection</button>
<button onclick="setReason('Repeated Images')">Repeated</button>
</div>

</div>
</div>

<div id="panel" class="panel">
<div class="panel-content glass">
<button onclick="toggleTheme()">Toggle Theme</button>
<button onclick="logout()">Logout</button>
</div>
<div class="panel-btn glass" onclick="togglePanel()">☰</div>
</div>

<script>

/* ✅ FIXED CSV PARSER */
function parseCSV(text){
  const rows = text.split("\n");
  const headers = rows[0].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

  return rows.slice(1).map(row=>{
    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    let obj = {};
    headers.forEach((h,i)=>{
      obj[h.trim()] = cols[i]?.replace(/^"|"$/g,"");
    });

    return obj;
  });
}

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQQviNsOTXM2LlIs5ipLiil6Nox9r6BH2o-7-WtgLbTKDIltzZlHXxnlWYm7KkJLfr1JsDM69wyevuT/pub?gid=846566121&output=csv";

let videos = [];
let filteredVideos = [];

async function loadData() {
const res = await fetch(SHEET_URL);
const text = await res.text();

const data = parseCSV(text);

videos = data.map(r => ({
video_id: r["v.video_id"],
enterprise: r["enterprise_name"],
enterprise_id: r["v.enterprise_id"],
qc_user: r["qc_user_email_id"],
status: r["verified_status"],
reason: r["rejected_reason"],
vin: r["vin_name"],
sku: r["sku_id"],
url: r["video_url"],
created: r["created_on"],
updated: r["updated_on"]
}))
.filter(v => v.video_id && v.video_id.startsWith("vid") && v.url);

filteredVideos = [...videos];

populateFilters();
renderVideos();
updateCount();
}

function populateFilters(){
const ent = [...new Set(videos.map(v=>v.enterprise))];
const users = [...new Set(videos.map(v=>v.qc_user).filter(u=>u && u.includes("@")))];

enterpriseFilter.innerHTML = `<option value="all">All Enterprises</option>` + ent.map(e=>`<option>${e}</option>`).join("");
qcUserFilter.innerHTML = `<option value="all">All QC Users</option>` + users.map(u=>`<option>${u}</option>`).join("");
}

function applyFilter(){
filteredVideos = videos.filter(v =>
(enterpriseFilter.value==="all" || v.enterprise===enterpriseFilter.value) &&
(qcUserFilter.value==="all" || v.qc_user===qcUserFilter.value) &&
(statusFilter.value==="all" || v.status===statusFilter.value) &&
(!videoSearch.value || v.video_id.includes(videoSearch.value)) &&
(!vinFilter.value || (v.vin||"").includes(vinFilter.value)) &&
(!skuFilter.value || (v.sku||"").includes(skuFilter.value))
);

renderVideos();
updateCount();
}

function clearFilters(){
enterpriseFilter.value="all";
qcUserFilter.value="all";
statusFilter.value="all";
videoSearch.value="";
vinFilter.value="";
skuFilter.value="";
filteredVideos=[...videos];
renderVideos();
updateCount();
}

function renderVideos(){
videoTable.innerHTML="";
filteredVideos.forEach((v,i)=>{
const row=document.createElement("tr");
row.innerHTML=`<td>${v.video_id}</td>`;
row.onclick=()=>loadVideo(i);
videoTable.appendChild(row);
});
if(filteredVideos.length) loadVideo(0);
}

function loadVideo(i){
const v=filteredVideos[i];
player.src=v.url;

meta.innerHTML=`
<b>Video:</b> ${v.video_id}<br>
<b>Enterprise:</b> ${v.enterprise}<br>
<b>Enterprise ID:</b> ${v.enterprise_id || "-"}<br>
<b>QC User:</b> ${v.qc_user}<br>
<b>Status:</b> ${v.status}<br>
${v.status==="rejected" ? `<b>Reason:</b> ${v.reason}<br>`:""}
<b>VIN:</b> ${v.vin || "-"}<br>
<b>SKU:</b> ${v.sku || "-"}<br>
<b>Created:</b> ${v.created}<br>
<b>Updated:</b> ${v.updated}
`;
}

function updateCount(){
videoCount.innerText=`Total: ${videos.length} | Filtered: ${filteredVideos.length}`;
}

function togglePanel(){ panel.classList.toggle("open"); }

function toggleTheme(){
document.body.classList.toggle("light");
localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}
if(localStorage.getItem("theme")==="light") document.body.classList.add("light");

function markQC(type){
rejectBox.style.display = (type==="Rejected") ? "block":"none";
}

function setReason(r){ comment.value=r; }

document.addEventListener("keydown",e=>{
if(e.key.toLowerCase()==="r") markQC("Rejected");
});

function logout(){
localStorage.removeItem("qc_reviewer");
location.href="login.html";
}

userName.innerText=reviewer;
window.onload=loadData;

</script>

</body>
</html>
